<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hive Nation v2.1.0 - AI Council + Agent Teams</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e17;
            --bg2: #111827;
            --bg3: #1a2234;
            --text: #e2e8f0;
            --text2: #94a3b8;
            --accent: #f59e0b;
            --accent2: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --hive: #f59e0b;
            --border: #1e293b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text);
            min-height: 100vh;
        }
        #root { min-height: 100vh; }
        
        /* Loading Screen */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 20px;
        }
        .loading-title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--hive), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-screen">
            <div class="loading-title">🏛️ Hive Nation v2.1.0</div>
            <div class="loading-spinner"></div>
            <div style="color: var(--text2)">Loading AI Council + Agent Teams...</div>
        </div>
    </div>
    <script type="module" src="/unified/app.js"></script>
</body>
</html>
